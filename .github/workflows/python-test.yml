
name: Python QA Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r qa_automation_project/requirements.txt
        # Install Chrome for Selenium UI tests
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run Pytest UI and API tests
      env:
        BASE_URL: http://www.example.com # Replace with your actual UI base URL
        API_BASE_URL: http://jsonplaceholder.typicode.com # Replace with your actual API base URL
        HEADLESS: True
      run: |
        pytest qa_automation_project/tests/ --json-report --json-report-file=report.json

    - name: Upload Pytest JSON Report
      uses: actions/upload-artifact@v4
      with:
        name: pytest-json-report
        path: report.json

    # Example of uploading an HTML report if pytest-html is used
