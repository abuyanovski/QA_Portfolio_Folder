
name: Python UI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pytest UI tests
      env:
        BASE_URL: https://www.saucedemo.com
        BROWSER: chrome
        HEADLESS: "true"
      run: |
        mkdir -p reports
        pytest tests/ui --html=reports/ui-report.html --self-contained-html --json-report --json-report-file=reports/report-ui.json

    - name: Upload Pytest UI Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-ui-reports
        path: reports/
